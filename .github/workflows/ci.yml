name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ledgent
          POSTGRES_PASSWORD: ledgent
          POSTGRES_DB: ledgent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ledgent -d ledgent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://ledgent:ledgent@localhost:5432/ledgent?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-access-secret-value-with-enough-length
      JWT_REFRESH_SECRET: ci-refresh-secret-value-with-enough-length
      APP_URL: http://localhost:5173
      API_URL: http://localhost:4000

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run prisma:generate
      - run: npm run lint
      - run: npm run build
      - run: npm run test
